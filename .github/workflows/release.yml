name: Release

on:
  push:
    tags:
      - v*
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag, for example v0.1.0
        required: true
        default: v0.1.0

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build zip
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          VERSION="${TAG#v}" ./script/package.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: CodexUsageBar
          path: |
            dist/CodexUsageBar.zip
            dist/CodexUsageBar.zip.sha256

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          gh release view "$TAG_NAME" >/dev/null 2>&1 || \
            gh release create "$TAG_NAME" --target "$GITHUB_SHA" --title "$TAG_NAME" --notes "Download CodexUsageBar.zip, unzip it, and move CodexUsageBar.app to Applications."
          gh release upload "$TAG_NAME" dist/CodexUsageBar.zip dist/CodexUsageBar.zip.sha256 --clobber
